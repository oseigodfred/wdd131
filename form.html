<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Product Review Form</title>

    <!-- ✅ REQUIRED META TAGS -->
    <meta name="description" content="Submit a product review including rating, installation date, useful features, and feedback.">
    <meta name="author" content="Godfred Osei">

    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>

<header>
    <h1>Product Review</h1>
</header>

<main>
    <form method="get" action="review.html">

        <!-- Product Name -->
        <div class="form-group">
            <label for="product">Product Name</label>
            <select id="product" name="product" required>
                <option value="" disabled selected>Select a Product ...</option>
            </select>
        </div>

        <!-- Rating -->
        <div class="form-group">
            <p>Overall Rating</p>

            <input type="radio" id="star1" name="rating" value="1" required>
            <label for="star1">☆</label>

            <input type="radio" id="star2" name="rating" value="2" required>
            <label for="star2">☆☆</label>

            <input type="radio" id="star3" name="rating" value="3" required>
            <label for="star3">☆☆☆</label>

            <input type="radio" id="star4" name="rating" value="4" required>
            <label for="star4">☆☆☆☆</label>

            <input type="radio" id="star5" name="rating" value="5" required>
            <label for="star5">☆☆☆☆☆</label>
        </div>

        <!-- Date -->
        <div class="form-group">
            <label for="installDate">Date of Installation</label>
            <input type="date" id="installDate" name="installDate" required>
        </div>

        <!-- Features -->
        <div class="form-group">
            <p>Useful Features</p>

            <input type="checkbox" id="feature1" name="features" value="Durability">
            <label for="feature1">Durability</label>

            <input type="checkbox" id="feature2" name="features" value="Efficiency">
            <label for="feature2">Efficiency</label>

            <input type="checkbox" id="feature3" name="features" value="Design">
            <label for="feature3">Design</label>

            <input type="checkbox" id="feature4" name="features" value="Ease of Use">
            <label for="feature4">Ease of Use</label>
        </div>

        <!-- Review -->
        <div class="form-group">
            <label for="review">Written Review</label>
            <textarea id="review" name="review"></textarea>
        </div>

        <!-- Username -->
        <div class="form-group">
            <label for="username">Your Name</label>
            <input type="text" id="username" name="username">
        </div>

        <!-- Submit -->
        <div class="form-group">
            <input type="submit" value="Submit Review">
        </div>

    </form>
</main>

<footer>
    <p>&copy; 2026 Product Reviews | All Rights Reserved</p>
</footer>

</body>
</html>
